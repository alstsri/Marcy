<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<title>marcy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #222222;
    --text: #e0e0e0;
    --text-dim: #666666;
    --text-muted: #444444;
    --accent: #ffffff;
    --red: #ff3b30;
    --orange: #ff9500;
    --green: #30d158;
    --blue: #0a84ff;
    --yellow: #ffd60a;
  }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 20px 72px;
    min-height: 100vh;
  }

  /* Header */
  .header {
    margin-bottom: 40px;
  }
  .header h1 {
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  /* Phase Banner */
  .phase-banner {
    padding: 16px 20px;
    border-left: 3px solid var(--text-muted);
    margin-bottom: 32px;
    background: var(--surface);
  }
  .phase-banner.fertile {
    border-left-color: var(--red);
    background: #1a0a0a;
  }
  .phase-banner.pms {
    border-left-color: var(--orange);
    background: #1a1400;
  }
  .phase-banner.late {
    border-left-color: var(--blue);
    background: #0a0a1a;
  }
  .phase-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .phase-banner.fertile .phase-label { color: var(--red); }
  .phase-banner.pms .phase-label { color: var(--orange); }
  .phase-banner.late .phase-label { color: var(--blue); }
  .phase-sub {
    font-size: 12px;
    color: var(--text-dim);
  }

  /* Cycle Day Ring */
  .ring-section {
    display: flex;
    align-items: center;
    gap: 32px;
    margin-bottom: 40px;
  }
  .ring-container {
    position: relative;
    width: 120px;
    height: 120px;
    flex-shrink: 0;
  }
  .ring-container svg {
    transform: rotate(-90deg);
  }
  .ring-bg {
    fill: none;
    stroke: var(--surface2);
    stroke-width: 4;
  }
  .ring-progress {
    fill: none;
    stroke: var(--text-dim);
    stroke-width: 4;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.8s ease;
  }
  .ring-progress.fertile { stroke: var(--red); }
  .ring-progress.pms { stroke: var(--orange); }
  .ring-progress.late { stroke: var(--blue); }
  .ring-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }
  .ring-day {
    font-size: 32px;
    font-weight: 300;
    color: var(--accent);
    line-height: 1;
  }
  .ring-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .ring-meta {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 2;
  }
  .ring-meta span {
    color: var(--text);
  }

  /* Timeline */
  .timeline {
    margin-bottom: 40px;
  }
  .timeline-title {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
  }
  .timeline-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .timeline-row:last-child { border-bottom: none; }
  .tl-event {
    font-size: 13px;
    color: var(--text);
  }
  .tl-date {
    font-size: 12px;
    color: var(--text-dim);
  }
  .tl-countdown {
    font-size: 12px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 3px;
    background: var(--surface2);
    color: var(--text-dim);
  }
  .tl-countdown.soon { color: var(--orange); background: #1a1400; }
  .tl-countdown.danger { color: var(--red); background: #1a0a0a; }
  .tl-countdown.active { color: var(--red); background: #1a0a0a; font-weight: 700; }

  /* Log Form */
  .log-section {
    margin-bottom: 40px;
  }
  .log-form {
    display: flex;
    gap: 8px;
  }
  .log-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 10px 14px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s;
  }
  .log-input:focus {
    border-color: var(--text-dim);
  }
  .log-input::placeholder {
    color: var(--text-muted);
  }
  .log-input::-webkit-calendar-picker-indicator {
    filter: invert(0.5);
    cursor: pointer;
  }
  .log-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 10px 20px;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .log-btn:hover { opacity: 0.85; }
  .log-btn:active { opacity: 0.7; }

  .toast {
    position: fixed;
    bottom: 72px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 10px 20px;
    border-radius: 4px;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast.error { border-color: var(--red); color: var(--red); }

  /* History */
  .history-section { margin-bottom: 40px; }
  .history-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .history-row:last-child { border-bottom: none; }
  .history-date { color: var(--text); }
  .history-len { color: var(--text-dim); }
  .history-del {
    color: var(--text-muted);
    background: none;
    border: none;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 2px;
    transition: color 0.2s;
  }
  .history-del:hover { color: var(--red); }

  .stat-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    font-size: 12px;
    color: var(--text-dim);
  }
  .stat-row span { color: var(--text); }

  /* Tension Alert */
  .tension-alert {
    padding: 16px 20px;
    border-left: 3px solid var(--yellow);
    background: #1a1800;
    margin-bottom: 32px;
  }
  .tension-alert .phase-label { color: var(--yellow); }
  .tension-alert .phase-sub { color: var(--text-dim); }

  /* Tension heatmap */
  .heatmap {
    display: flex;
    gap: 4px;
    margin-top: 12px;
    align-items: flex-end;
    height: 40px;
  }
  .heat-bar {
    flex: 1;
    background: var(--surface2);
    border-radius: 2px 2px 0 0;
    min-height: 4px;
    position: relative;
  }
  .heat-bar.hot { background: var(--yellow); }
  .heat-bar.warm { background: #665200; }
  .heat-labels {
    display: flex;
    gap: 4px;
    margin-top: 2px;
  }
  .heat-labels span {
    flex: 1;
    text-align: center;
    font-size: 8px;
    color: var(--text-muted);
  }

  /* Today Card */
  .today-btn {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    font-weight: 400;
    padding: 14px 20px;
    border-radius: 4px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 40px;
    text-align: left;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .today-btn:hover { border-color: var(--text-dim); background: var(--surface2); }
  .today-btn .today-arrow {
    font-size: 10px;
    color: var(--text-muted);
    transition: transform 0.2s;
  }
  .today-btn.open .today-arrow { transform: rotate(90deg); }
  .today-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px;
    margin-top: -32px;
    margin-bottom: 40px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .today-section-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
    margin-top: 20px;
  }
  .today-section-label:first-of-type { margin-top: 0; }
  .today-text {
    font-size: 13px;
    line-height: 1.7;
    color: var(--text-dim);
  }
  .today-text strong {
    color: var(--text);
    font-weight: 500;
  }

  /* Onboarding */
  .onboard {
    padding: 40px 0;
  }
  .onboard-title {
    font-size: 16px;
    font-weight: 300;
    color: var(--accent);
    margin-bottom: 24px;
    line-height: 1.6;
  }
  .onboard-text {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.8;
    margin-bottom: 32px;
  }
  .onboard-field {
    margin-bottom: 20px;
  }
  .onboard-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .onboard-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .onboard-note {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
  }
  .onboard-btn {
    width: 100%;
    background: var(--accent);
    color: var(--bg);
    border: none;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 14px 20px;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 8px;
  }
  .onboard-btn:hover { opacity: 0.85; }
  .onboard-btn:active { opacity: 0.7; }
  .onboard-skip {
    display: block;
    width: 100%;
    text-align: center;
    background: none;
    border: none;
    font-family: inherit;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 12px;
    margin-top: 4px;
  }
  .onboard-skip:hover { color: var(--text-dim); }

  /* Confirm Dialog */
  .confirm-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    animation: fadeIn 0.15s ease;
  }
  .confirm-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 24px;
    max-width: 300px;
    width: 90%;
    text-align: center;
  }
  .confirm-msg {
    font-size: 13px;
    color: var(--text);
    margin-bottom: 20px;
    line-height: 1.6;
  }
  .confirm-actions {
    display: flex;
    gap: 8px;
  }
  .confirm-actions button {
    flex: 1;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 10px;
    border-radius: 4px;
    cursor: pointer;
    border: none;
    transition: opacity 0.2s;
  }
  .confirm-cancel {
    background: var(--surface2);
    color: var(--text-dim);
  }
  .confirm-delete {
    background: var(--red);
    color: var(--bg);
  }

  /* Late period prompt */
  .late-prompt {
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 32px;
  }
  .late-prompt-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .late-prompt-text {
    font-size: 12px;
    color: var(--text-dim);
  }
  .late-prompt-extra {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
  }
  .late-prompt-btn {
    background: var(--blue);
    color: var(--bg);
    border: none;
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 8px 14px;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s;
  }
  .late-prompt-btn:hover { opacity: 0.85; }

  /* Learning note */
  .learning-note {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.8;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 32px;
  }
  .learning-note strong {
    color: var(--text-dim);
    font-weight: 500;
  }

  /* Email prompt */
  .email-prompt {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
    margin-bottom: 32px;
  }
  .email-prompt-text {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }
  .email-prompt-form {
    display: flex;
    gap: 8px;
  }
  .email-prompt-skip {
    display: block;
    text-align: center;
    background: none;
    border: none;
    font-family: inherit;
    font-size: 11px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 8px;
    margin-top: 4px;
  }
  .email-prompt-skip:hover { color: var(--text-dim); }

  /* Settings */
  .settings-section {
    margin-bottom: 40px;
  }
  .settings-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .settings-row:last-child { border-bottom: none; }
  .settings-label { color: var(--text-dim); }
  .settings-value {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .settings-input {
    width: 60px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 6px 10px;
    border-radius: 4px;
    text-align: center;
    outline: none;
  }
  .settings-input:focus { border-color: var(--text-dim); }
  .settings-save {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .settings-save:hover { color: var(--text); border-color: var(--text-dim); }

  /* Backup */
  .backup-row {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .backup-btn {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 10px;
    border-radius: 4px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }
  .backup-btn:hover { color: var(--text); border-color: var(--text-dim); }
  .backup-file { display: none; }

  /* Terms */
  .terms {
    font-size: 10px;
    color: var(--text-muted);
    line-height: 1.8;
    padding: 16px 0;
    border-top: 1px solid var(--border);
    margin-top: 8px;
  }
  .terms-toggle {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    background: none;
    border: none;
    font-family: inherit;
    cursor: pointer;
    padding: 8px 0;
    transition: color 0.2s;
  }
  .terms-toggle:hover { color: var(--text-dim); }

  /* Bottom Nav */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 50;
    max-width: 480px;
    margin: 0 auto;
  }
  .nav-tab {
    flex: 1;
    padding: 14px 0 max(14px, env(safe-area-inset-bottom));
    text-align: center;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    background: none;
    border: none;
    cursor: pointer;
    transition: color 0.2s;
  }
  .nav-tab.active {
    color: var(--text);
  }
  .nav-tab:hover {
    color: var(--text-dim);
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 20px 0;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 13px;
    line-height: 2;
  }

  /* Sections */
  .section-title {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  /* Mobile tweaks */
  @media (max-width: 400px) {
    .app { padding: 16px 16px 72px; }
    .ring-section { gap: 20px; }
    .ring-container { width: 100px; height: 100px; }
    .ring-day { font-size: 26px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>marcy</h1>
  </div>

  <div id="content">
    <div class="empty">loading...</div>
  </div>

  <div class="toast" id="toast"></div>
  <div id="confirm-root"></div>

  <nav class="bottom-nav" id="bottom-nav" style="display:none">
    <button class="nav-tab active" data-view="dashboard" onclick="switchView('dashboard')">dashboard</button>
    <button class="nav-tab" data-view="manage" onclick="switchView('manage')">data</button>
  </nav>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────
const FORMSPREE_URL = 'https://formspree.io/f/mdayreqr';

// ── Data Layer (localStorage) ───────────────────────────────────
const STORAGE_KEY = 'marcy_data';
const DEFAULT_DATA = {
  periods: [],
  tensions: [],
  settings: { default_cycle_length: 28, manual_cycle_length: null },
  onboarded: false,
  email_prompted: false,
  email: null,
};

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return structuredClone(DEFAULT_DATA);
    const d = JSON.parse(raw);
    if (!d.tensions) d.tensions = [];
    if (!d.settings) d.settings = { default_cycle_length: 28, manual_cycle_length: null };
    if (d.settings.manual_cycle_length === undefined) d.settings.manual_cycle_length = null;
    if (d.onboarded === undefined) d.onboarded = false;
    if (d.email_prompted === undefined) d.email_prompted = false;
    if (d.email === undefined) d.email = null;
    return d;
  } catch {
    return structuredClone(DEFAULT_DATA);
  }
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ── Export / Import ─────────────────────────────────────────────
function exportData() {
  const data = loadData();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `marcy-backup-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('backup downloaded');
}

function importData(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.periods || !Array.isArray(data.periods)) {
        toast('invalid backup file', true);
        return;
      }
      if (!data.tensions) data.tensions = [];
      if (!data.settings) data.settings = { default_cycle_length: 28, manual_cycle_length: null };
      data.onboarded = true;
      if (data.email_prompted === undefined) data.email_prompted = false;
      if (data.email === undefined) data.email = null;
      saveData(data);
      toast(`restored ${data.periods.length} period${data.periods.length !== 1 ? 's' : ''}`);
      render();
    } catch {

// ── Cycle Math ──────────────────────────────────────────────────
function parseDate(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function daysBetween(a, b) {
  return Math.round((b - a) / 86400000);
}

function isoDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function addDays(d, n) {
  const r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}

function dayOfYear() {
  const now = new Date();
  return Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
}

function getCycleLength(data) {
  if (data.settings.manual_cycle_length) return data.settings.manual_cycle_length;
  const periods = [...data.periods].sort();
  if (periods.length < 2) return data.settings.default_cycle_length;
  const diffs = [];
  for (let i = 1; i < periods.length; i++) {
    const d = daysBetween(parseDate(periods[i - 1]), parseDate(periods[i]));
    if (d >= 18 && d <= 45) diffs.push(d);
  }
  if (!diffs.length) return data.settings.default_cycle_length;
  if (diffs.length === 1) return diffs[0];
  let weightedSum = 0, totalWeight = 0;
  for (let i = 0; i < diffs.length; i++) {
    const weight = i + 1;
    weightedSum += diffs[i] * weight;
    totalWeight += weight;
  }
  return Math.round(weightedSum / totalWeight);
}

function getCycleLengthType(data) {
  if (data.settings.manual_cycle_length) return 'manual';
  if (data.periods.length < 2) return 'default';
  return 'calculated';
}

function getPredictions(data) {
  const periods = [...data.periods].sort();
  if (!periods.length) return null;
  const lastStart = parseDate(periods[periods.length - 1]);
  const cycleLen = getCycleLength(data);
  const nextPeriod = addDays(lastStart, cycleLen);
  const ovulationDay = addDays(nextPeriod, -14);
  const fertileStart = addDays(ovulationDay, -4);
  const fertileEnd = addDays(ovulationDay, 1);
  const pmsStart = addDays(nextPeriod, -7);
  return { lastPeriod: lastStart, cycleLength: cycleLen, nextPeriod, ovulationDay, fertileStart, fertileEnd, pmsStart };
}

function getTensionAnalysis(data) {
  const tensions = [...(data.tensions || [])].sort();
  const periods = [...data.periods].sort();
  if (!tensions.length || !periods.length) return null;
  const daysBeforePeriod = [];
  for (const t of tensions) {
    const tDate = parseDate(t);
    let matched = false;
    for (const p of periods) {
      const pDate = parseDate(p);
      if (pDate > tDate) {
        const diff = daysBetween(tDate, pDate);
        if (diff <= 14) daysBeforePeriod.push(diff);
        matched = true;
        break;
      }
    }
    if (!matched) {
      const preds = getPredictions(data);
      if (preds) {
        const diff = daysBetween(tDate, preds.nextPeriod);
        if (diff > 0 && diff <= 14) daysBeforePeriod.push(diff);
      }
    }
  }
  if (!daysBeforePeriod.length) return null;
  const freq = {};
  for (const d of daysBeforePeriod) freq[d] = (freq[d] || 0) + 1;
  let hottestDay = daysBeforePeriod[0], maxCount = 0;
  for (const [day, count] of Object.entries(freq)) {
    if (count > maxCount) { maxCount = count; hottestDay = Number(day); }
  }
  const avg = Math.round(daysBeforePeriod.reduce((a, b) => a + b, 0) / daysBeforePeriod.length * 10) / 10;
  return { total_fights: tensions.length, mapped_fights: daysBeforePeriod.length, avg_days_before: avg, hottest_day_before: hottestDay, frequency: freq };
}

function getStatus() {
  const data = loadData();
  const preds = getPredictions(data);
  if (!preds) return { empty: true };
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const cycleDay = daysBetween(preds.lastPeriod, today) + 1;
  let phase = 'normal', phaseLabel = '';
  if (preds.fertileStart <= today && today <= preds.fertileEnd) {
    phase = 'fertile'; phaseLabel = 'FERTILE WINDOW';
  } else if (today.getTime() === preds.ovulationDay.getTime()) {
    phase = 'fertile'; phaseLabel = 'OVULATION DAY';
  } else if (preds.pmsStart <= today && today < preds.nextPeriod) {
    phase = 'pms'; phaseLabel = 'PMS WINDOW';
  } else if (today >= preds.nextPeriod) {
    const daysLate = daysBetween(preds.nextPeriod, today);
    phase = 'late';
    if (daysLate <= 2) phaseLabel = 'PERIOD EXPECTED';
    else phaseLabel = `PERIOD ${daysLate}D LATE`;
  }
  const daysToFertile = daysBetween(today, preds.fertileStart);
  const daysToPms = daysBetween(today, preds.pmsStart);
  const daysToPeriod = daysBetween(today, preds.nextPeriod);
  const daysToOvulation = daysBetween(today, preds.ovulationDay);
  const tensionData = getTensionAnalysis(data);
  let tensionAlert = null;
  if (tensionData) {
    const hotDay = tensionData.hottest_day_before;
    const hotDate = addDays(preds.nextPeriod, -hotDay);
    tensionAlert = { hottest_day_before_period: hotDay, days_until_hot_day: daysBetween(today, hotDate), hot_date: isoDate(hotDate) };
  }
  return {
    empty: false, today: isoDate(today), cycle_day: cycleDay, cycle_length: preds.cycleLength,
    cycle_type: getCycleLengthType(data), last_period: isoDate(preds.lastPeriod),
    next_period: isoDate(preds.nextPeriod), fertile_start: isoDate(preds.fertileStart),
    fertile_end: isoDate(preds.fertileEnd), ovulation_day: isoDate(preds.ovulationDay),
    pms_start: isoDate(preds.pmsStart), phase, phase_label: phaseLabel,
    days_to_fertile: daysToFertile, days_to_pms: daysToPms, days_to_period: daysToPeriod,
    days_to_ovulation: daysToOvulation, total_periods: data.periods.length,
    tension_analysis: tensionData, tension_alert: tensionAlert,
  };
}

function getHistory() {
  const data = loadData();
  const periods = [...data.periods].sort();
  const entries = periods.map((p, i) => {
    const entry = { date: p };
    if (i > 0) entry.cycle_length = daysBetween(parseDate(periods[i - 1]), parseDate(p));
    return entry;
  });
  return { entries, average: getCycleLength(data), total_cycles: Math.max(0, periods.length - 1) };
}

function toast(msg, isError) {
  const t = $('#toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 2400);
}

function fmtDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[d.getMonth()]} ${d.getDate()}`;
}

function countdown(days) {
  if (days < 0) return { text: 'past', cls: '' };
  if (days === 0) return { text: 'now', cls: 'active' };
  if (days <= 3) return { text: `${days}d`, cls: 'danger' };
  if (days <= 7) return { text: `${days}d`, cls: 'soon' };
  return { text: `${days}d`, cls: '' };
}

function getEarlyTrackingNote(data) {
  const count = data.periods.length;
  if (count >= 3 || count < 1) return null;
  const notes = {
    1: [
      "marcy is just getting started — predictions are based on a general 28-day estimate. <strong>most cycles fall between 21 and 35 days.</strong> it'll get smarter as you log more.",
      "first cycle logged. right now marcy is using a standard estimate. <strong>every cycle you log makes predictions more accurate.</strong>",
      "one data point so far — <strong>marcy will learn her actual pattern over the next few cycles.</strong> don't worry if timing feels off at first.",
    ],
    2: [
      "two cycles tracked — <strong>marcy is starting to learn her rhythm.</strong> predictions are improving but still early. normal cycles range 21–35 days.",
      "getting closer. with two data points, <strong>marcy has its first real calculation.</strong> a few more cycles and predictions will be dialed in.",
      "marcy just calculated its first real cycle length. <strong>patterns usually stabilize after 3–4 tracked cycles.</strong>",
    ],
  };
  return notes[count][dayOfYear() % notes[count].length];
}

function getLateReassurance(daysLate, data) {
  const general = [
    "cycles vary — travel, stress, sleep changes, and time zone shifts can all push things back",
    "a few days' variation is completely normal — cycles aren't clocks",
    "stress, diet changes, illness, or intense exercise can all delay a period by several days",
    "cycle lengths naturally fluctuate — even consistent cycles shift by a few days sometimes",
  ];
  let msg = '';
  if (daysLate <= 2) {
    msg = "should arrive any time now — " + general[dayOfYear() % general.length];
  } else if (daysLate <= 5) {
    msg = general[dayOfYear() % general.length];
  } else {
    msg = general[dayOfYear() % general.length] + ". if this continues much longer, she may want to check in with a doctor";
  }
  if (data.periods.length < 3) {
    msg += " — marcy is still learning her pattern, so the prediction may simply be off";
  }
  return msg;
}

        <div class="email-prompt-form">
          <input type="email" class="log-input" id="email-input" placeholder="email@example.com">
          <button class="log-btn" style="font-size:11px;padding:10px 14px" onclick="const v=document.getElementById('email-input').value;if(v&&v.includes('@'))submitEmail(v);else toast('enter a valid email',true)">send</button>
        </div>
        <button class="email-prompt-skip" onclick="skipEmail()">skip</button>
      </div>
    `;
  }

  // Ring + meta
  const pct = status.phase === 'late' ? 1 : Math.min(status.cycle_day / status.cycle_length, 1);
  const circumference = 2 * Math.PI * 52;
  const offset = circumference * (1 - pct);
  let ringClass = status.phase === 'fertile' ? 'fertile' : status.phase === 'pms' ? 'pms' : '';
  if (status.phase === 'late') ringClass = 'late';
  const cycleLenLabel = status.cycle_type === 'default' ? '(est)' : status.cycle_type === 'manual' ? '(set)' : '';

  html += `
    <div class="ring-section">
      <div class="ring-container">
        <svg width="120" height="120" viewBox="0 0 120 120">
          <circle class="ring-bg" cx="60" cy="60" r="52"/>
          <circle class="ring-progress ${ringClass}" cx="60" cy="60" r="52"
            stroke-dasharray="${circumference}"
            stroke-dashoffset="${offset}"/>
        </svg>
        <div class="ring-text">
          <div class="ring-day">${status.phase === 'late' ? '+' + daysLate : status.cycle_day}</div>
          <div class="ring-label">${status.phase === 'late' ? 'past due' : 'of ' + status.cycle_length}</div>
        </div>
      </div>
      <div class="ring-meta">
        last period<br><span>${fmtDate(status.last_period)}</span><br>
        cycle length<br><span>${status.cycle_length}d ${cycleLenLabel}</span><br>
        tracked<br><span>${status.total_periods} period${status.total_periods !== 1 ? 's' : ''}</span>
      </div>
    </div>
  `;

  // Early tracking note
  const earlyNote = getEarlyTrackingNote(data);
  if (earlyNote) {
    html += `<div class="learning-note">${earlyNote}</div>`;
  }

  // Today button
  html += todayButton(status);

  // Timeline
  const events = [
    { label: 'Fertile window', date: status.fertile_start, days: status.days_to_fertile, end: status.fertile_end },
    { label: 'Ovulation', date: status.ovulation_day, days: status.days_to_ovulation },
    { label: 'PMS starts', date: status.pms_start, days: status.days_to_pms },
  ];
  if (status.tension_alert) {
    events.push({ label: 'Peak tension', date: status.tension_alert.hot_date, days: status.tension_alert.days_until_hot_day, isTension: true });
  }
  events.push({ label: 'Next period', date: status.next_period, days: status.days_to_period });
  events.sort((a, b) => a.days - b.days);

  html += `<div class="timeline"><div class="timeline-title">upcoming</div>`;
  for (const ev of events) {
    const cd = countdown(ev.days);
    const dateStr = ev.end ? `${fmtDate(ev.date)} – ${fmtDate(ev.end)}` : fmtDate(ev.date);
    html += `
      <div class="timeline-row">
        <div>
          <div class="tl-event">${ev.label}</div>
          <div class="tl-date">${dateStr}</div>
        </div>
        <div class="tl-countdown ${cd.cls}">${cd.text}</div>
      </div>
    `;
  }
  html += `</div>`;

  return html;
}

// ── Manage View ─────────────────────────────────────────────────
function renderManage(status, data, history, tensions) {
  let html = '';

  // Log forms
  html += `
    <div class="log-section">
      <div class="section-title">log period</div>
      <div class="log-form">
        <input type="date" class="log-input" id="log-date">
        <button class="log-btn" id="log-btn">log</button>
      </div>
    </div>
    <div class="log-section">
      <div class="section-title">log tension</div>
      <div class="log-form">
        <input type="date" class="log-input" id="tension-date">
        <button class="log-btn" id="tension-btn" style="background:var(--yellow);color:var(--bg)">log</button>
      </div>
    </div>
  `;

  // Tension heatmap
  if (status.tension_analysis && status.tension_analysis.mapped_fights > 0) {
    const freq = status.tension_analysis.frequency;
    const maxFreq = Math.max(...Object.values(freq));
    html += `<div class="timeline" style="margin-bottom:32px"><div class="timeline-title">tension pattern</div>`;
    html += `<div class="stat-row">logged: <span>${status.tension_analysis.total_fights} event${status.tension_analysis.total_fights !== 1 ? 's' : ''}</span></div>`;
    html += `<div class="stat-row" style="margin-bottom:8px">avg: <span>${status.tension_analysis.avg_days_before}d before period</span></div>`;
    html += `<div class="heatmap">`;
    for (let d = 7; d >= 1; d--) {
      const count = freq[d] || 0;
      const height = count > 0 ? Math.max(20, (count / maxFreq) * 100) : 10;
      const cls = count === maxFreq && count > 0 ? 'hot' : count > 0 ? 'warm' : '';
      html += `<div class="heat-bar ${cls}" style="height:${height}%" title="${d}d before: ${count}"></div>`;
    }
    html += `</div><div class="heat-labels">`;
    for (let d = 7; d >= 1; d--) html += `<span>-${d}d</span>`;
    html += `</div></div>`;
  }

  // Tension history
  if (tensions.length > 0) {
    html += `<div class="history-section"><div class="section-title">tension log</div>`;
    for (const f of [...tensions].reverse()) {
      html += `
        <div class="history-row">
          <span class="history-date">${fmtDate(f)}</span>
          <span class="history-len"></span>
          <button class="history-del" onclick="confirmDelTension('${f}')">&times;</button>
        </div>
      `;
    }
    html += `</div>`;
  }

  // Period history
  if (history.entries.length > 0) {
    html += `<div class="history-section"><div class="section-title">period history</div>`;
    html += `<div class="stat-row">cycles: <span>${history.total_cycles}</span></div>`;
    html += `<div class="stat-row" style="margin-bottom:12px">avg length: <span>${history.average}d</span></div>`;
    for (const e of [...history.entries].reverse()) {
      const lenStr = e.cycle_length ? `${e.cycle_length}d` : '—';
      html += `
        <div class="history-row">
          <span class="history-date">${fmtDate(e.date)}</span>
          <span class="history-len">${lenStr}</span>
          <button class="history-del" onclick="confirmDel('${e.date}')">&times;</button>
        </div>
      `;
    }
    html += `</div>`;
  }

  // Settings
  html += `
    <div class="settings-section">
      <div class="section-title">settings</div>
      <div class="settings-row">
        <span class="settings-label">cycle length override</span>
        <div class="settings-value">
          <input type="number" class="settings-input" id="settings-cycle" min="18" max="45"
            placeholder="${data.settings.manual_cycle_length || getCycleLength(data)}"
            value="${data.settings.manual_cycle_length || ''}">
          <button class="settings-save" id="settings-save-cycle">save</button>
        </div>
      </div>
      <div class="settings-row" style="border-bottom:none">
        <span class="settings-label" style="font-size:11px;color:var(--text-muted)">
          ${data.settings.manual_cycle_length ? 'manual override active — clear to use auto-calculation' : 'blank = auto-calculated from logged periods'}
        </span>
        ${data.settings.manual_cycle_length ? '<button class="settings-save" id="settings-clear-cycle">clear</button>' : ''}
      </div>
    </div>
  `;

  // Email in settings
  html += `
    <div class="settings-section">
      <div class="section-title">email</div>
      <div class="settings-row" style="border-bottom:none">
        ${data.email
          ? `<span class="settings-label">${data.email}</span><button class="settings-save" id="settings-clear-email">remove</button>`
          : `<input type="email" class="log-input" id="settings-email" placeholder="email@example.com" style="flex:1">
             <button class="settings-save" id="settings-save-email" style="margin-left:8px">save</button>`
        }
      </div>
      <div style="font-size:10px;color:var(--text-muted);padding-top:4px">for product updates only — sent to Formspree</div>
    </div>
  `;

  // Backup
  html += `
    <div class="settings-section">
      <div class="section-title">data</div>
      <div style="font-size:11px;color:var(--text-muted);line-height:1.8;margin-bottom:12px">
        <strong style="color:var(--text-dim);font-weight:500">your data lives on this device only.</strong> Marcy doesn't use accounts or servers — everything is stored locally on your device. Your data will persist through normal use, but it <strong style="color:var(--text-dim);font-weight:500">will be deleted</strong> if you delete the app or reset your device.
        <br><br>
        Export a backup to save a copy of your data as a file. If your data is ever lost, use import to restore it.
      </div>
      <div class="backup-row">
        <button class="backup-btn" onclick="exportData()">export backup</button>
        <button class="backup-btn" onclick="document.getElementById('import-file').click()">import backup</button>
        <input type="file" accept=".json" class="backup-file" id="import-file">
      </div>
    </div>
  `;

  // Disclaimer
  html += `
    <div class="settings-section" style="margin-bottom:0">
      <button class="terms-toggle" onclick="toggleTerms()">${termsOpen ? '▾' : '▸'} disclaimer</button>
      ${termsOpen ? `<div class="terms">
        All predictions are estimates based on general medical conventions regarding average menstrual cycle patterns, including a standard 14-day luteal phase assumption. Every person's cycle is different, and actual timing may vary significantly from these estimates.
        <br><br>
        Marcy is not a medical device and is not intended to diagnose, treat, or prevent any condition. This app should not be relied upon for contraception, fertility planning, or any medical decision-making.
        <br><br>
        The developers of Marcy assume no liability for any actions taken or not taken based on information provided by this app. Use at your own discretion and consult a healthcare provider for medical advice.
        <br><br>
        All data is stored locally on your device. If you provide your email, it is sent to a third-party service (Formspree) for storage. No other data leaves your device. You are solely responsible for backing up your data.
      </div>` : ''}
    </div>
  `;

  html += `<div class="footer">marcy &middot; local &middot; private</div>`;
  return html;
}

// ── Main Render ─────────────────────────────────────────────────
function render() {
  const data = loadData();
  const nav = document.getElementById('bottom-nav');

  // Onboarding
  if (!data.onboarded && data.periods.length === 0) {
    $('#content').innerHTML = renderOnboarding();
    bindOnboarding();
    if (nav) nav.style.display = 'none';
    return;
  }

  // Show nav
  if (nav) nav.style.display = 'flex';
  document.querySelectorAll('.nav-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.view === currentView);
  });

  const status = getStatus();
  const history = getHistory();
  const tensions = [...(data.tensions || [])].sort();

  if (status.empty) {
    $('#content').innerHTML = `
      <div class="empty">no data yet.<br>log a period to get started.</div>
      <div class="log-section">
        <div class="section-title">log period</div>
        <div class="log-form">
          <input type="date" class="log-input" id="log-date">
          <button class="log-btn" id="log-btn">log</button>
        </div>
      </div>
    `;
    bindForms();
    return;
  }

  if (currentView === 'dashboard') {
    $('#content').innerHTML = renderDashboard(status, data);
  } else {
    $('#content').innerHTML = renderManage(status, data, history, tensions);
    bindForms();
    bindSettings();
  }
}

// ── Form Binding ────────────────────────────────────────────────
function bindForms() {
  const today = isoDate(new Date());

  const logInput = $('#log-date');
  const logBtn = $('#log-btn');
  if (logInput && logBtn) {
    logInput.value = today;
    logBtn.addEventListener('click', () => {
      const val = logInput.value;
      if (!val) return;
      const data = loadData();
      if (data.periods.includes(val)) { toast(`${val} already logged`, true); return; }
      const prevCount = data.periods.length;
      data.periods.push(val);
      data.periods.sort();
      saveData(data);
      // First real cycle acknowledgment
      if (prevCount === 1) {
        const cycleLen = getCycleLength(data);
        toast(`first cycle: ${cycleLen} days — marcy is learning`);
      } else {
        toast(`logged ${fmtDate(val)}`);
      }
      currentView = 'dashboard';
      render();
    });
  }

  const tensionInput = $('#tension-date');
  const tensionBtn = $('#tension-btn');
  if (tensionInput && tensionBtn) {
    tensionInput.value = today;
    tensionBtn.addEventListener('click', () => {
      const val = tensionInput.value;
      if (!val) return;
      const data = loadData();
      if (data.tensions.includes(val)) { toast(`${val} already logged`, true); return; }
      data.tensions.push(val);
      data.tensions.sort();
      saveData(data);
      toast(`logged tension ${fmtDate(val)}`);
      currentView = 'dashboard';
      render();
    });
  }

  // Import file handler
  const importFile = document.getElementById('import-file');
  if (importFile) {
    importFile.addEventListener('change', (e) => { if (e.target.files[0]) importData(e.target.files[0]); });
  }
}

function bindSettings() {
  const saveBtn = document.getElementById('settings-save-cycle');
  if (saveBtn) {
    saveBtn.addEventListener('click', () => {
      const input = document.getElementById('settings-cycle');
      const val = input.value.trim();
      const data = loadData();
      if (!val) { data.settings.manual_cycle_length = null; }
      else {
        const n = parseInt(val);
        if (n < 18 || n > 45) { toast('cycle length must be 18-45 days', true); return; }
        data.settings.manual_cycle_length = n;
      }
      saveData(data);
      toast(val ? `cycle length set to ${val}d` : 'using auto-calculation');
      render();
    });
  }

  const clearBtn = document.getElementById('settings-clear-cycle');
  if (clearBtn) {
    clearBtn.addEventListener('click', () => {
      const data = loadData();
      data.settings.manual_cycle_length = null;
      saveData(data);
      toast('using auto-calculation');
      render();
    });
  }

  // Email settings
  const saveEmail = document.getElementById('settings-save-email');
  if (saveEmail) {
    saveEmail.addEventListener('click', () => {
      const input = document.getElementById('settings-email');
      const val = input.value.trim();
      if (!val || !val.includes('@')) { toast('enter a valid email', true); return; }
      submitEmail(val);
    });
  }

  const clearEmail = document.getElementById('settings-clear-email');
  if (clearEmail) {
    clearEmail.addEventListener('click', () => {
      const data = loadData();
      data.email = null;
      saveData(data);
      toast('email removed');
      render();
    });
  }
}

function confirmDel(dateStr) {
  showConfirm(`Remove period ${fmtDate(dateStr)}?<br><span style="font-size:11px;color:var(--text-dim)">This will affect cycle calculations.</span>`, () => {
    const data = loadData();
    data.periods = data.periods.filter(p => p !== dateStr);
    saveData(data);
    toast(`removed ${fmtDate(dateStr)}`);
    render();
  });
}

function confirmDelTension(dateStr) {
  showConfirm(`Remove tension event ${fmtDate(dateStr)}?`, () => {
    const data = loadData();
    data.tensions = data.tensions.filter(t => t !== dateStr);
    saveData(data);
    toast(`removed tension ${fmtDate(dateStr)}`);
    render();
  });
}

// PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

render();
</script>
</body>
</html>
